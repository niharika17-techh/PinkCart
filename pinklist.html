<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishlist - Pink Cart</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand-title">
          <svg class="brand-logo" viewBox="0 0 64 64" aria-hidden="true">
            <defs>
              <linearGradient id="pinkGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ff4fa3" stop-opacity="0.28" />
                <stop offset="1" stop-color="#ffe1f0" stop-opacity="1" />
              </linearGradient>
            </defs>
            <circle cx="32" cy="32" r="30" fill="url(#pinkGrad)" stroke="#ff4fa3" stroke-width="2" />

            <!-- Cart basket -->
            <path
              d="M18 22h10l2 6h20l-3 18H26l-2-10H18l-2-14z"
              fill="none"
              stroke="#ff2f93"
              stroke-width="2"
              stroke-linejoin="round"
            />
            <!-- Lipstick -->
            <rect x="34" y="12" width="7" height="18" rx="4" fill="#ff4fa3" />
            <path d="M31 12h13l-3-6H34l-3 6z" fill="#ff2f93" opacity="0.9" />

            <!-- Wheels -->
            <circle cx="25" cy="52" r="4.3" fill="none" stroke="#ff4fa3" stroke-width="2" />
            <circle cx="46" cy="52" r="4.3" fill="none" stroke="#ff4fa3" stroke-width="2" />

            <!-- Heart + sparkles -->
            <path
              d="M32 44c-6-3.7-10-7-10-11.5C22 29 24.2 27 27 27c2 0 3.4 1.1 5 3c1.6-1.9 3-3 5-3c2.8 0 5 2 5 5.5c0 4.5-4 7.8-10 11.5z"
              fill="#ff4fa3"
              opacity="0.25"
            />
            <path d="M50 18l1.2-3.4L52.4 18l3.6 1.1-3.6 1.1-1.2 3.4-1.2-3.4-3.6-1.1L50 18z" fill="#ff4fa3" opacity="0.35" />
            <path d="M12 28l1-2.6 1 2.6 2.8 0.9-2.8 0.9-1 2.6-1-2.6-2.8-0.9L12 28z" fill="#ff2f93" opacity="0.25" />
          </svg>
          <div>
            <h1 class="brand">Pink Cart</h1>
            <p class="tagline">Your saved Pinklist</p>
          </div>
        </div>
        <a class="nav-link" href="index.html">Home</a>
      </header>

      <section class="section">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <h2 class="section-title" style="margin:0;">Pinklist</h2>
          <button id="logoutBtn" class="btn danger" type="button">
            Logout
          </button>
        </div>

        <div id="PinklistNotice" class="auth-notice" aria-live="polite"></div>
        <div id="PinklistGrid" class="product-grid"></div>
      </section>
    </div>

    <script src="pinklist.js" defer></script>
  </body>
</html>
