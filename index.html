<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pink Cart - Online Makeup Store</title>
    <link rel="stylesheet" href="style.css"
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand-title">
          <svg class="brand-logo" viewBox="0 0 64 64" aria-hidden="true">
            <defs>
              <linearGradient id="pinkGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ff4fa3" stop-opacity="0.28" />
                <stop offset="1" stop-color="#ffe1f0" stop-opacity="1" />
              </linearGradient>
            </defs>
            <circle cx="32" cy="32" r="30" fill="url(#pinkGrad)" stroke="#ff4fa3" stroke-width="2" />

            <!-- Cart basket -->
            <path
              d="M18 22h10l2 6h20l-3 18H26l-2-10H18l-2-14z"
              fill="none"
              stroke="#ff2f93"
              stroke-width="2"
              stroke-linejoin="round"
            />
            <!-- Lipstick -->
            <rect x="34" y="12" width="7" height="18" rx="4" fill="#ff4fa3" />
            <path d="M31 12h13l-3-6H34l-3 6z" fill="#ff2f93" opacity="0.9" />

            <!-- Wheels -->
            <circle cx="25" cy="52" r="4.3" fill="none" stroke="#ff4fa3" stroke-width="2" />
            <circle cx="46" cy="52" r="4.3" fill="none" stroke="#ff4fa3" stroke-width="2" />

            <!-- Heart + sparkles -->
            <path
              d="M32 44c-6-3.7-10-7-10-11.5C22 29 24.2 27 27 27c2 0 3.4 1.1 5 3c1.6-1.9 3-3 5-3c2.8 0 5 2 5 5.5c0 4.5-4 7.8-10 11.5z"
              fill="#ff4fa3"
              opacity="0.25"
            />
            <path d="M50 18l1.2-3.4L52.4 18l3.6 1.1-3.6 1.1-1.2 3.4-1.2-3.4-3.6-1.1L50 18z" fill="#ff4fa3" opacity="0.35" />
            <path d="M12 28l1-2.6 1 2.6 2.8 0.9-2.8 0.9-1 2.6-1-2.6-2.8-0.9L12 28z" fill="#ff2f93" opacity="0.25" />
          </svg>
          <div>
            <h1 class="brandlogo">Pink Cart</h1>
            <p class="tagline">Online Makeup Store</p>
          </div>
        </div>

        <nav class="nav">
          <a class="nav-link" id="pinklistNav" href="pinklist.html">Pinklist</a>
          <a class="nav-link" id="loginNav" href="login.html">Login</a>
          <button id="logoutBtn" class="nav-link btn-link" type="button">
            Logout
          </button>
        </nav>
      </header>

      <div id="notice" class="notice" aria-live="polite"></div>

      <main class="main">
        <section class="section">
          <h2 class="section-title">Makeup Picks</h2>
          <div id="productGrid" class="product-grid"></div>
        </section>

        <section class="section cart-section">
          <h2 class="section-title">Shopping Cart</h2>

          <div id="cartItems" class="cart-items"></div>

          <div class="cart-summary">
            <div class="cart-total">
              Total: <span id="cartTotal">₹0.00</span>
            </div>
            <button id="checkoutBtn" class="btn primary" type="button">
              Checkout
            </button>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>Made with a soft pink theme. Beginner-friendly demo.</p>
      </footer>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
